name: Tesing-732

on: 
 workflow_dispatch:

jobs:
  build:
    name: Build and Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
   
    steps:
    - uses: actions/checkout@v6
    - name: Install .NET SDK
      uses: actions/setup-dotnet@v5
      with:
          global-json-file: global.json
          workloads: maui

    - name: Diagnose dotnet used
      shell: bash
      run: |
          dotnet --info
          dotnet workload install maui -v diag
   
   
